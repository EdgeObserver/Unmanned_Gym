server:
  port: 5100
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:unmanned_gym}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  application:
    name: UserService
  cloud:
    nacos:
      server-addr: localhost:8848
  config:
    import:
      - nacos:UserService.properties
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:liuhaonan}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        acknowledge-mode: manual  # 手动确认
        concurrency: 3
        max-concurrency: 10
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
aliyun:
  oss:
    endpoint:   ${OSS_ENDPOINT}
    bucket:     ${OSS_BUCKET_NAME}
    access-key: ${ALIYUN_ACCESS_KEY_ID}
    secret-key: ${ALIYUN_ACCESS_KEY_SECRET}
    dir-prefix: ${OSS_DIR_PREFIX:user_face/}
    illegal_dir-prefix: ${OSS_ILLEGAL_DIR_PREFIX:illegal_user_face/}
    local-base: ${OSS_LOCAL_BASE:D:\IdeaProjects\AttendanceSystem\data\face_cache}