server:
  port: 5200
spring:
  application:
    name: CountService
  cloud:
    nacos:
      server-addr: localhost:8848
  config:
    import:
      - nacos:CountService.properties
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/unmanned_gym
    username: root
    password: 4114
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto  # 手动确认
        concurrency: 3
        max-concurrency: 10
mybatis:
  configuration:
    map-underscore-to-camel-case: true #开启驼峰命名和下划线命名的自动转换
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

count:
  port: 8000
  python:
    script-path: D:\IdeaProjects\AttendanceSystem\python\PersonDetectService.py
    service-url: http://localhost:8000
  camera:
    enabled: true
    device-id: 0